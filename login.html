<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="./images/logo-original.png">
    <link rel="stylesheet" href="login.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Vollkorn:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">

    <title>Login/Cadastro</title>
</head>
<body>
    <div class="container">
        <div class="lgo">
            <img src="./images/logo-original.png" type="logo" alt="imagem" width="55" height="55">
            <h1>Sabor da Terra</h1>
        </div>
        <h2>Bem-vindo, faça seu login!</h2>
        <form id="formLogin">
            <div class="formulario1">
                <label  for="email">E-mail<input type="email" id="emailLogin"  autocomplete="username" id="email" placeholder="Digite seu e-mail..." required></label><br>
                <br>
                <label for="senha">Senha<input type="password"id="senhaLogin"   autocomplete="current-password"  id=senha placeholder="Digite sua senha..." required></label><br>
                <br>
            </div>
            <div class="botao-enviar">
                <button type="submit">Entrar</button>
            </div>
        </form>
        <div class="frase">
            <p>Não possui uma conta? <a href="cadastro.html">Cadastre-se</a></p>
        </div>
    </div>
    <script src="sabordaterra.js"></script>
</body>
</html>
